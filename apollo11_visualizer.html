<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apollo 11 Interactive V2 - HD Simulation</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Inter', 'Segoe UI', Arial, sans-serif;
        }

        #canvas-container {
            width: 100vw;
            height: 100vh;
        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 40px;
            box-sizing: border-box;
            background: radial-gradient(circle at center, transparent 60%, rgba(0, 0, 0, 0.6) 100%);
        }

        .header {
            text-align: left;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.8);
        }

        .header h1 {
            margin: 0;
            font-size: 3rem;
            font-weight: 300;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: #ffffff;
        }

        .header p {
            margin: 8px 0 0 0;
            font-size: 1.1rem;
            color: #cccccc;
            font-weight: 300;
            letter-spacing: 1px;
        }

        .main-hud {
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: flex-end;
        }

        .stats-panel {
            pointer-events: auto;
            background: rgba(10, 15, 20, 0.7);
            padding: 20px 30px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            min-width: 250px;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 6px;
        }

        .stat-row:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .stat-label {
            color: #8899aa;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stat-value {
            font-family: 'Menlo', 'Courier New', monospace;
            font-size: 1.1rem;
            color: #00ffcc;
            font-weight: bold;
        }

        .controls-panel {
            pointer-events: auto;
            display: flex;
            gap: 10px;
        }

        button {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            backdrop-filter: blur(5px);
        }

        button:hover {
            background: rgba(255, 255, 255, 0.9);
            color: black;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 255, 255, 0.2);
        }

        button.active {
            background: #00ffcc;
            color: black;
            border-color: #00ffcc;
        }

        /* TIMELINE SCRUBBER */
        .timeline-container {
            pointer-events: auto;
            width: 100%;
            background: rgba(10, 15, 20, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 20px 30px;
            border-radius: 12px;
            box-sizing: border-box;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            margin-top: auto;
        }

        .timeline-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            color: #aaa;
        }

        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
            margin: 10px 0;
        }

        input[type=range]:focus {
            outline: none;
        }

        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 6px;
            cursor: pointer;
            background: #334455;
            border-radius: 3px;
        }

        input[type=range]::-webkit-slider-thumb {
            height: 20px;
            width: 20px;
            border-radius: 50%;
            background: #00ffcc;
            cursor: pointer;
            -webkit-appearance: none;
            margin-top: -7px;
            box-shadow: 0 0 10px #00ffcc;
        }

        #loading {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #000;
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            font-family: 'Inter', sans-serif;
            transition: opacity 1s;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top: 3px solid #00ffcc;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
    <!-- load three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
</head>

<body>
    <div id="loading">
        <div class="spinner"></div>
        <h2 style="font-weight: 300; letter-spacing: 2px;">CALCULATING ORBITAL MECHANICS</h2>
        <p style="color: #666;">Integrating Restricted 3-Body Problem</p>
    </div>

    <div id="canvas-container"></div>

    <div id="ui-layer">
        <div class="header">
            <h1>APOLLO 11</h1>
            <p>Free-Return Trajectory | High Fidelity Simulation</p>
        </div>

        <div class="main-hud">
            <div class="stats-panel" id="telemetry">
                <div class="stat-row"><span class="stat-label">Mission Time</span><span class="stat-value"
                        id="t-time">T+ 00:00:00</span></div>
                <div class="stat-row"><span class="stat-label">Velocity</span><span class="stat-value" id="t-vel">0.00
                        km/s</span></div>
                <div class="stat-row"><span class="stat-label">Distance (Earth)</span><span class="stat-value"
                        id="t-dist">0 km</span></div>
                <div class="stat-row"><span class="stat-label">Distance (Moon)</span><span class="stat-value"
                        id="t-dist-moon">0 km</span></div>
            </div>

            <div class="controls-panel">
                <button id="btn-cam" class="active">Smart Track CAM</button>
                <button id="btn-free">Free CAM</button>
            </div>
        </div>

        <div class="timeline-container">
            <div class="timeline-header">
                <span>LAUNCH (TLI)</span>
                <span style="color: #00ffcc;" id="phase-status">Translunar Coast</span>
                <span>SPLASHDOWN</span>
            </div>
            <input type="range" id="timeline-slider" min="0" max="1000" value="0">
            <div style="display: flex; justify-content: center; margin-top: 15px; gap: 15px;">
                <button id="btn-play">PAUSE / PLAY</button>
                <button id="btn-speed">SPEED: 1X</button>
            </div>
        </div>
    </div>

    <script>
        // --- 1. Scientific Physics Engine (R3BP) ---
        const G = 6.67430e-11;
        const M_E = 5.972e24;
        const M_M = 7.348e22;
        const D_EM = 3.844e8;
        const L_star = D_EM;
        const M_star = M_E + M_M;
        const T_star = Math.sqrt(Math.pow(L_star, 3) / (G * M_star));

        const mu = M_M / M_star;
        const mu_E = 1 - mu;
        const x_E = -mu;
        const x_M = 1 - mu;

        function derivatives(state) {
            const [x, y, z, vx, vy, vz] = state;
            const rE = Math.sqrt(Math.pow(x - x_E, 2) + y * y + z * z);
            const rM = Math.sqrt(Math.pow(x - x_M, 2) + y * y + z * z);
            const ax = 2 * vy + x - mu_E * (x - x_E) / Math.pow(rE, 3) - mu * (x - x_M) / Math.pow(rM, 3);
            const ay = -2 * vx + y - mu_E * y / Math.pow(rE, 3) - mu * y / Math.pow(rM, 3);
            const az = -mu_E * z / Math.pow(rE, 3) - mu * z / Math.pow(rM, 3);
            return [vx, vy, vz, ax, ay, az];
        }

        function rk4Step(state, dt) {
            const k1 = derivatives(state);
            const s2 = state.map((v, i) => v + 0.5 * dt * k1[i]);
            const k2 = derivatives(s2);
            const s3 = state.map((v, i) => v + 0.5 * dt * k2[i]);
            const k3 = derivatives(s3);
            const s4 = state.map((v, i) => v + dt * k3[i]);
            const k4 = derivatives(s4);
            return state.map((v, i) => v + (dt / 6) * (k1[i] + 2 * k2[i] + 2 * k3[i] + k4[i]));
        }

        const trajectoryPoints = [];
        let state = [x_E + (6371e3 + 200e3) / L_star, 0, 0, 0, (10.92e3 * T_star) / L_star, 0.05]; // Slight Z inclination
        const dt = 0.002;

        // --- Pre-compute trajectory in background ---
        setTimeout(() => {
            let flightTime = 0;
            for (let i = 0; i < 4500; i++) { // Approx 8-9 days
                trajectoryPoints.push([...state]);
                state = rk4Step(state, dt);
                flightTime += dt;
                const rE = Math.sqrt(Math.pow(state[0] - x_E, 2) + state[1] * state[1] + state[2] * state[2]);
                if (i > 500 && rE < (6371e3 / L_star)) break; // Splashdown
            }
            document.getElementById('loading').style.opacity = '0';
            setTimeout(() => document.getElementById('loading').style.display = 'none', 1000);
            init3D();
        }, 100);

        // --- 2. Ultra-Realistic 3D Graphics ---
        let scene, camera, renderer, controls, apolloGroup, pathLine;
        let pIndex = 0;
        let isPlaying = true;
        let trackCamera = true;
        let simSpeed = 1; // 1, 2, 5, 10

        // "Smart Scale" Configuration
        // The distance between bodies is normal, but the bodies are visually enlarged
        const PLANET_SCALE = 30; // Visually enlarge planets 30x so they are breathtaking
        const DISTANCE_SCALE = 150; // Spread out the system 150x 

        const textureLoader = new THREE.TextureLoader();
        const gltfLoader = new THREE.GLTFLoader();

        function init3D() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 50000);
            camera.position.set(-10, 20, 50);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false, logarithmicDepthBuffer: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.0;
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.maxDistance = 1000;

            // --- Lighting ---
            const ambient = new THREE.AmbientLight(0xffffff, 0.05); // Dark space
            scene.add(ambient);
            const sunLight = new THREE.DirectionalLight(0xffffff, 2.0); // Harsh bright sun
            sunLight.position.set(-500, 100, 200);
            scene.add(sunLight);

            // --- Starfield HDRI ---
            const starGeo = new THREE.BufferGeometry();
            const starCount = 15000;
            const starPos = new Float32Array(starCount * 3);
            for (let i = 0; i < starCount * 3; i++) {
                const r = 4000 + Math.random() * 1000;
                const theta = 2 * Math.PI * Math.random();
                const phi = Math.acos(2 * Math.random() - 1);
                starPos[i] = r * Math.sin(phi) * Math.cos(theta); // x
                starPos[i + 1] = r * Math.sin(phi) * Math.sin(theta); // y
                starPos[i + 2] = r * Math.cos(phi); // z
            }
            starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
            const starMat = new THREE.PointsMaterial({ color: 0xffffff, size: 2.0, sizeAttenuation: false, transparent: true, opacity: 0.8 });
            scene.add(new THREE.Points(starGeo, starMat));

            // --- Earth ---
            const R_E = (6371e3 / L_star) * DISTANCE_SCALE * PLANET_SCALE;
            const earthGeo = new THREE.SphereGeometry(R_E, 128, 128);

            // Try loading textures, fallback to procedurals if local files missing
            const earthMat = new THREE.MeshStandardMaterial({
                color: 0x2266cc,
                roughness: 0.6,
                metalness: 0.1
            });
            textureLoader.load('assets/earth_8k.jpg', (tex) => {
                earthMat.map = tex; earthMat.color = new THREE.Color(0xffffff); earthMat.needsUpdate = true;
            });

            const earth = new THREE.Mesh(earthGeo, earthMat);
            earth.position.set(x_E * DISTANCE_SCALE, 0, 0);
            earth.rotation.z = 23.5 * Math.PI / 180; // Axial tilt
            scene.add(earth);

            // Atmos Glow
            const atmosGeo = new THREE.SphereGeometry(R_E * 1.02, 64, 64);
            const atmosMat = new THREE.MeshBasicMaterial({ color: 0x4488ff, transparent: true, opacity: 0.15, side: THREE.BackSide, blending: THREE.AdditiveBlending });
            earth.add(new THREE.Mesh(atmosGeo, atmosMat));

            // --- Moon ---
            const R_M = (1737e3 / L_star) * DISTANCE_SCALE * PLANET_SCALE;
            const moonGeo = new THREE.SphereGeometry(R_M, 64, 64);
            const moonMat = new THREE.MeshStandardMaterial({
                color: 0x999999,
                roughness: 0.9,
            });
            textureLoader.load('assets/moon_8k.jpg', (tex) => {
                moonMat.map = tex; moonMat.color = new THREE.Color(0xffffff); moonMat.needsUpdate = true;
            });
            const moon = new THREE.Mesh(moonGeo, moonMat);
            moon.position.set(x_M * DISTANCE_SCALE, 0, 0);
            scene.add(moon);

            // --- Apollo Spacecraft Group ---
            apolloGroup = new THREE.Group();
            scene.add(apolloGroup);

            // Load 3D model (Fallback to beautiful glowing cube/engine if model fails)
            gltfLoader.load('assets/apollo_csm.glb', (gltf) => {
                const model = gltf.scene;
                model.scale.set(0.5, 0.5, 0.5); // Tune to fit view
                // add metallic look to box placeholder
                model.traverse((child) => { if (child.isMesh) { child.material.metalness = 0.8; child.material.roughness = 0.2; } });
                apolloGroup.add(model);
            }, undefined, () => {
                // Procedural Fallback Spacecraft
                const csmGeo = new THREE.ConeGeometry(0.5, 2, 16);
                csmGeo.rotateX(Math.PI / 2); // Point forward
                const csmMat = new THREE.MeshStandardMaterial({ color: 0xdddddd, metalness: 0.9, roughness: 0.1 });
                apolloGroup.add(new THREE.Mesh(csmGeo, csmMat));
            });

            // Engine thrust glow
            const thrustGeo = new THREE.SphereGeometry(0.8, 16, 16);
            const thrustMat = new THREE.MeshBasicMaterial({ color: 0x00aaff, transparent: true, opacity: 0.6, blending: THREE.AdditiveBlending });
            const thrust = new THREE.Mesh(thrustGeo, thrustMat);
            thrust.position.set(0, 0, -1);
            apolloGroup.add(thrust);

            // --- Path Line ---
            const pathMat = new THREE.LineBasicMaterial({ color: 0x00ffcc, transparent: true, opacity: 0.4, linewidth: 2 });
            const pathGeometry = new THREE.BufferGeometry();
            const pathPositions = new Float32Array(trajectoryPoints.length * 3);
            pathGeometry.setAttribute('position', new THREE.BufferAttribute(pathPositions, 3));
            pathLine = new THREE.Line(pathGeometry, pathMat);
            scene.add(pathLine);

            // --- Wire up UI ---
            const slider = document.getElementById('timeline-slider');
            slider.max = trajectoryPoints.length - 1;

            slider.addEventListener('input', (e) => {
                pIndex = parseInt(e.target.value);
                isPlaying = false;
                updateFrame();
            });

            document.getElementById('btn-play').addEventListener('click', () => isPlaying = !isPlaying);

            document.getElementById('btn-speed').addEventListener('click', (e) => {
                simSpeed = simSpeed === 1 ? 2 : (simSpeed === 2 ? 5 : (simSpeed === 5 ? 10 : 1));
                e.target.innerText = `SPEED: ${simSpeed}X`;
            });

            document.getElementById('btn-cam').addEventListener('click', (e) => {
                trackCamera = true;
                e.target.classList.add('active');
                document.getElementById('btn-free').classList.remove('active');
            });

            document.getElementById('btn-free').addEventListener('click', (e) => {
                trackCamera = false;
                e.target.classList.add('active');
                document.getElementById('btn-cam').classList.remove('active');
            });

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });

            animate();
        }

        function updateTelemetry(state, idx) {
            const timeDays = (idx * dt * T_star) / 86400;
            const hours = Math.floor(timeDays * 24);
            const mins = Math.floor((timeDays * 24 * 60) % 60);
            const v_sim = Math.sqrt(state[3] ** 2 + state[4] ** 2 + state[5] ** 2);
            const v_km_s = (v_sim * L_star / T_star) / 1000;

            const distE = Math.sqrt(Math.pow(state[0] - x_E, 2) + state[1] ** 2 + state[2] ** 2) * L_star;
            const distM = Math.sqrt(Math.pow(state[0] - x_M, 2) + state[1] ** 2 + state[2] ** 2) * L_star;
            const altE = (distE - 6371e3) / 1000;
            const altM = (distM - 1737e3) / 1000;

            document.getElementById('t-time').innerText = `T+ ${String(hours).padStart(2, '0')}h ${String(mins).padStart(2, '0')}m`;
            document.getElementById('t-vel').innerText = `${v_km_s.toFixed(2)} km/s`;
            document.getElementById('t-dist').innerText = `${Math.floor(altE).toLocaleString()} km`;
            document.getElementById('t-dist-moon').innerText = `${Math.floor(altM).toLocaleString()} km`;

            // Phase detection
            let phase = "Translunar Coast";
            if (hours < 2) phase = "Earth Parking Orbit / TLI";
            else if (distM < 50000e3 && state[3] < 0) phase = "Lunar Approach / LOI";
            else if (state[3] < 0) phase = "Transearth Coast";
            else if (altE < 10000) phase = "Re-entry & Splashdown";
            document.getElementById('phase-status').innerText = phase;

            // Update slider without triggering 'input' event
            document.getElementById('timeline-slider').value = idx;
        }

        function updateFrame() {
            if (pIndex >= trajectoryPoints.length) pIndex = trajectoryPoints.length - 1;
            const s = trajectoryPoints[pIndex];

            // Calculate Position
            const px = s[0] * DISTANCE_SCALE;
            const py = s[1] * DISTANCE_SCALE;
            const pz = s[2] * DISTANCE_SCALE;
            apolloGroup.position.set(px, py, pz);

            // Calculate Velocity Vector for Rotation (Point spacecraft forward)
            const vx = s[3]; const vy = s[4]; const vz = s[5];
            const direction = new THREE.Vector3(vx, vy, vz).normalize();
            // Create a quaternion that rotates z-axis to face the direction
            const quaternion = new THREE.Quaternion().setFromUnitVectors(new THREE.Vector3(0, 0, 1), direction);
            apolloGroup.quaternion.copy(quaternion);

            // Progress Path Line
            const positions = pathLine.geometry.attributes.position.array;
            for (let i = 0; i < trajectoryPoints.length; i++) {
                // If past current point, collapse to current point
                const d = i > pIndex ? pIndex : i;
                positions[i * 3] = trajectoryPoints[d][0] * DISTANCE_SCALE;
                positions[i * 3 + 1] = trajectoryPoints[d][1] * DISTANCE_SCALE;
                positions[i * 3 + 2] = trajectoryPoints[d][2] * DISTANCE_SCALE;
            }
            pathLine.geometry.attributes.position.needsUpdate = true;

            // Camera Logic
            if (trackCamera) {
                controls.target.copy(apolloGroup.position);
                // Position camera gracefully behind and above the spacecraft
                const camOffset = direction.clone().multiplyScalar(-15).add(new THREE.Vector3(0, 5, 0));
                camera.position.lerp(apolloGroup.position.clone().add(camOffset), 0.1);
            }

            updateTelemetry(s, pIndex);
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();

            if (isPlaying && pIndex < trajectoryPoints.length - 1) {
                pIndex += simSpeed;
                updateFrame();
            }

            // Slowly rotate planets
            scene.children.forEach(c => {
                if (c.geometry && c.geometry.type === 'SphereGeometry' && c.position.x !== 0) {
                    c.rotation.y += 0.001;
                }
            });

            renderer.render(scene, camera);
        }
    </script>
</body>

</html>
